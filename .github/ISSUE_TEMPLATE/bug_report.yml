name: Bug report
description: Report a problem with the detector, sender, or pipeline
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `bash scripts/run_local.sh ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or report.json output
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.1 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - detector
        - sender
        - notifier lambda
        - reactor lambda
        - terraform
        - other
    validations:
      required: true
